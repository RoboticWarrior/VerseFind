<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Verse of the Day</title>
    </head>

    <body>
        <div style="text-align: center; font-size: 80px;">
            <h1>Verse of the Day</h1>
        </div>

        <div style="text-align: center; padding: 60px; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color:cadetblue;">
            <h1 style="font-size: 60px; accent-color: white;">{{verse}}</h1>
        </div>

        <div style="text-align: center; padding: 80px">
            <button onclick="clicked(page_load='home')" style="accent-color: white; background-color: cadetblue; font-size: 40px; cursor: pointer;">Home</button>
        </div>

        <script>
            function clicked(page_load) {
                fetch("/load_page", {method: "POST", body: page_load}).then(res => {if (res.redirected) window.location.href = res.url;});
            }
        </script>
    </body>
</html>
